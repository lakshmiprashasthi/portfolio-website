  <style>
    body { font-family: 'Outfit', sans-serif; }

    .card {
      perspective: 1000px;
      width: 18rem;
      height: 12rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;          /* 🔑 fixes white edge */
      border-radius: 1rem;
    }

    .card:hover {
  transform: translateY(-6px);
}


    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s, box-shadow 0.3s ease;
      transform-style: preserve-3d;
      cursor: pointer;
      box-shadow: 0 15px 30px rgba(231, 84, 128, 0.25);
      will-change: transform;
    }

    .card:hover .card-inner {
  box-shadow: 0 25px 45px rgba(231, 84, 128, 0.35);
}

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card-front {
      background-size: cover;
      background-position: center;
    }

    .card-back {
  background: rgba(255, 230, 238, 0.95);
  transform: rotateY(180deg);
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(231, 84, 128, 0.25);
}

  </style>
</head>
